<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>본사 vs VINA 치수 비교</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; color: #222; }
.topbar { background: #1a1a2e; color: #fff; padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; }
.topbar h1 { font-size: 15px; font-weight: 700; }
.topbar p { font-size: 11px; opacity: 0.5; margin-top: 3px; }
.container { max-width: 1000px; margin: 0 auto; padding: 24px 16px; }
.legend-bar { background: #fff; border-radius: 10px; padding: 14px 20px; border: 1px solid #e4e4e4; margin-bottom: 16px; display: flex; align-items: center; gap: 24px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #555; }
.dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
.dot-hq { background: #2980b9; }
.dot-vina { background: #e74c3c; }
.spec-bar-legend { width: 30px; height: 8px; background: #dbeafe; border-radius: 2px; border: 1px solid #93c5fd; }
.card { background: #fff; border-radius: 10px; padding: 20px; border: 1px solid #e4e4e4; margin-bottom: 12px; }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.card-no { width: 28px; height: 28px; border-radius: 50%; background: #1a1a2e; color: #fff; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.card-no.angle { background: #aaa; }
.card-info { flex: 1; margin-left: 12px; }
.card-name { font-size: 13px; font-weight: 700; color: #1a1a2e; }
.card-spec { font-size: 11px; color: #888; margin-top: 2px; }
.card-vals { display: flex; gap: 16px; font-size: 11px; }
.val-hq { color: #2980b9; font-weight: 600; }
.val-vina { color: #e74c3c; font-weight: 600; }
.val-gap { color: #888; }
.val-gap.warn { color: #d68910; font-weight: 600; }
.val-gap.danger { color: #c0392b; font-weight: 600; }

/* 스펙 범위 차트 */
.spec-chart { position: relative; height: 36px; margin-top: 8px; }
.spec-track { position: absolute; top: 14px; left: 0; right: 0; height: 8px; background: #f0f0f0; border-radius: 4px; }
.spec-range { position: absolute; top: 14px; height: 8px; background: #dbeafe; border: 1px solid #93c5fd; border-radius: 3px; }
.spec-center { position: absolute; top: 14px; width: 2px; height: 8px; background: #93c5fd; }
.dot-hq-pos { position: absolute; top: 8px; width: 18px; height: 18px; border-radius: 50%; background: #2980b9; border: 2px solid #fff; box-shadow: 0 2px 6px rgba(41,128,185,0.4); transform: translateX(-50%); cursor: pointer; transition: transform 0.2s; }
.dot-hq-pos:hover { transform: translateX(-50%) scale(1.2); }
.dot-vina-pos { position: absolute; top: 8px; width: 18px; height: 18px; border-radius: 50%; background: #e74c3c; border: 2px solid #fff; box-shadow: 0 2px 6px rgba(231,76,60,0.4); transform: translateX(-50%); cursor: pointer; transition: transform 0.2s; }
.dot-vina-pos:hover { transform: translateX(-50%) scale(1.2); }
.spec-label-min { position: absolute; bottom: 0; font-size: 9px; color: #aaa; transform: translateX(-50%); }
.spec-label-max { position: absolute; bottom: 0; font-size: 9px; color: #aaa; transform: translateX(-50%); }
.spec-label-nom { position: absolute; bottom: 0; font-size: 9px; color: #3b82f6; transform: translateX(-50%); font-weight: 600; }
.out-of-range { font-size: 10px; color: #c0392b; font-weight: 600; margin-left: 6px; }

.angle-note { font-size: 10px; color: #aaa; margin-top: 8px; font-style: italic; }
.badge { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 600; }
.bg { background: #eafaf1; color: #1e8449; }
.by { background: #fef9e7; color: #d68910; }
.br { background: #fdedec; color: #c0392b; }
.bk { background: #f0f0f0; color: #999; }

.section-title { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.06em; margin: 20px 0 10px; }
.footer { text-align: center; font-size: 11px; color: #bbb; padding: 16px 0; border-top: 1px solid #e8e8e8; margin-top: 16px; }
.back-btn { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: #666; margin-bottom: 16px; cursor: pointer; padding: 6px 12px; border-radius: 6px; border: 1px solid #e4e4e4; background: #fff; }
.back-btn:hover { border-color: #1a1a2e; color: #1a1a2e; }
</style>
</head>
<body>

<div class="topbar">
  <div>
    <h1>성우전자 &nbsp;|&nbsp; 본사(HQ) vs VINA 치수 비교</h1>
    <p>MX5A EREV · BR BRKT LH·RH (BR0037) · Spec 범위 내 실측값 비교</p>
  </div>
</div>

<div class="container">

  <div class="back-btn" onclick="history.back()">← 대시보드로 돌아가기</div>

  <div class="legend-bar">
    <strong style="font-size:12px;color:#333">범례</strong>
    <div class="legend-item"><span class="dot dot-hq"></span> 본사(HQ) 측정값</div>
    <div class="legend-item"><span class="dot dot-vina"></span> VINA 측정값</div>
    <div class="legend-item"><span class="spec-bar-legend"></span> Spec 허용 범위</div>
    <div class="legend-item" style="margin-left:auto">
      <span class="badge bg">정상</span>&nbsp;Gap &lt; 0.05 &nbsp;
      <span class="badge by">주의</span>&nbsp;0.05~0.1 &nbsp;
      <span class="badge br">즉시수리</span>&nbsp;≥ 0.1
    </div>
  </div>

  <div class="section-title">정면도 항목 (No.1 ~ 9)</div>
  <div id="frontItems"></div>

  <div class="section-title">측면도 항목 (No.10 ~ 13)</div>
  <div id="sideItems"></div>

  <div class="section-title">배면도 항목 (No.14 ~ 18)</div>
  <div id="backItems"></div>

  <div class="footer">
    성우전자 글로벌 품질관리 · BR0037 HQ vs VINA 치수 비교 · 생성일: 2026-05-19
  </div>
</div>

<script>
const items = [
  {no:1,  name:'상단 마운팅 Y축 거리', view:'front', spec:19.5, tol:0.5,  hq:19.635, vina:19.507, isAngle:false},
  {no:2,  name:'좌측 브라켓 Y축 거리', view:'front', spec:12.0, tol:0.4,  hq:12.004, vina:11.962, isAngle:false},
  {no:3,  name:'하단 홀 직경 (ø8.5)', view:'front', spec:8.5,  tol:0.2,  hq:8.607,  vina:8.510,  isAngle:false},
  {no:4,  name:'중앙 브라켓 X축 거리', view:'front', spec:12.0, tol:0.4,  hq:11.990, vina:11.990, isAngle:false},
  {no:5,  name:'하단 X축 거리',        view:'front', spec:24.0, tol:0.5,  hq:24.015, vina:24.048, isAngle:false},
  {no:6,  name:'좌측 단차 X축 거리',   view:'front', spec:4.0,  tol:0.4,  hq:4.097,  vina:3.990,  isAngle:false},
  {no:7,  name:'우측 브라켓 Y축 거리', view:'front', spec:9.5,  tol:0.5,  hq:9.448,  vina:9.634,  isAngle:false},
  {no:8,  name:'파이프 직경 (ø36.1)', view:'front', spec:36.1, tol:0.5,  hq:36.200, vina:36.203, isAngle:false},
  {no:9,  name:'상단 홀 Y축',          view:'front', spec:5.0,  tol:0.2,  hq:4.960,  vina:4.840,  isAngle:false},
  {no:10, name:'파이프 연결 각도',      view:'side',  spec:16.5, tol:3.0,  hq:15.906, vina:17.276, isAngle:true},
  {no:11, name:'하단 플랜지 각도',      view:'side',  spec:2.0,  tol:3.0,  hq:2.189,  vina:2.323,  isAngle:true},
  {no:12, name:'파이프 X축 거리',       view:'side',  spec:5.0,  tol:0.4,  hq:4.925,  vina:4.920,  isAngle:false},
  {no:13, name:'스프링 클립 두께(T값)', view:'side',  spec:2.0,  tol:0.5,  hq:1.980,  vina:2.080,  isAngle:false},
  {no:14, name:'상단 X축 거리',         view:'back',  spec:19.5, tol:0.5,  hq:19.565, vina:19.610, isAngle:false},
  {no:15, name:'중앙 X축 거리',         view:'back',  spec:18.0, tol:0.5,  hq:18.015, vina:18.120, isAngle:false},
  {no:16, name:'좌측 플랜지 각도(90°)', view:'back',  spec:90.0, tol:3.0,  hq:90.468, vina:90.385, isAngle:true},
  {no:17, name:'하단 Y축 거리',         view:'back',  spec:19.5, tol:0.5,  hq:19.575, vina:19.620, isAngle:false},
  {no:18, name:'우측 파이프 각도(2.5°)',view:'back',  spec:2.5,  tol:3.0,  hq:2.039,  vina:3.031,  isAngle:true},
];

function makeCard(item) {
  const gap = Math.abs(item.hq - item.vina);
  const min = item.spec - item.tol;
  const max = item.spec + item.tol;
  const range = item.tol * 2;
  const chartW = 100; // %

  // 차트 범위를 spec 중심으로 양쪽 tol*1.5 여유
  const viewMin = item.spec - item.tol * 1.8;
  const viewMax = item.spec + item.tol * 1.8;
  const viewRange = viewMax - viewMin;

  function toPercent(val) {
    return Math.min(Math.max(((val - viewMin) / viewRange) * 100, 2), 98);
  }

  const specLeft = toPercent(min);
  const specRight = toPercent(max);
  const specWidth = specRight - specLeft;
  const nomPos = toPercent(item.spec);
  const hqPos = toPercent(item.hq);
  const vinaPos = toPercent(item.vina);

  const hqOut = item.hq < min || item.hq > max;
  const vinaOut = item.vina < min || item.vina > max;

  let badgeCls, badgeText;
  if(item.isAngle) { badgeCls='bk'; badgeText='참고치수'; }
  else if(gap >= 0.1) { badgeCls='br'; badgeText='즉시수리'; }
  else if(gap >= 0.05) { badgeCls='by'; badgeText='주의관찰'; }
  else { badgeCls='bg'; badgeText='정상'; }

  const gapClass = item.isAngle ? '' : gap >= 0.1 ? 'danger' : gap >= 0.05 ? 'warn' : '';

  return `
  <div class="card">
    <div class="card-header">
      <div class="card-no ${item.isAngle?'angle':''}">${item.no}</div>
      <div class="card-info">
        <div class="card-name">${item.name} ${item.isAngle?'<span style="font-size:10px;color:#aaa;font-weight:400">(각도 참고)</span>':''}</div>
        <div class="card-spec">Spec: ${item.spec} ± ${item.tol} &nbsp;|&nbsp; 범위: ${min.toFixed(2)} ~ ${max.toFixed(2)}</div>
      </div>
      <div class="card-vals">
        <div class="val-hq">● HQ: ${item.hq.toFixed(3)}${hqOut?'<span class="out-of-range">범위초과!</span>':''}</div>
        <div class="val-vina">● VINA: ${item.vina.toFixed(3)}${vinaOut?'<span class="out-of-range">범위초과!</span>':''}</div>
        <div class="val-gap ${gapClass}">Gap: ${gap.toFixed(3)}</div>
        <span class="badge ${badgeCls}">${badgeText}</span>
      </div>
    </div>
    <div class="spec-chart">
      <div class="spec-track"></div>
      <div class="spec-range" style="left:${specLeft}%;width:${specWidth}%"></div>
      <div class="spec-center" style="left:${nomPos}%"></div>
      <div class="dot-hq-pos" style="left:${hqPos}%" title="HQ: ${item.hq}"></div>
      <div class="dot-vina-pos" style="left:${vinaPos}%" title="VINA: ${item.vina}"></div>
      <div class="spec-label-min" style="left:${specLeft}%">${min.toFixed(2)}</div>
      <div class="spec-label-nom" style="left:${nomPos}%">${item.spec}</div>
      <div class="spec-label-max" style="left:${specRight}%">${max.toFixed(2)}</div>
    </div>
  </div>`;
}

const frontEl = document.getElementById('frontItems');
const sideEl = document.getElementById('sideItems');
const backEl = document.getElementById('backItems');

items.forEach(item => {
  const card = makeCard(item);
  if(item.view === 'front') frontEl.innerHTML += card;
  else if(item.view === 'side') sideEl.innerHTML += card;
  else backEl.innerHTML += card;
});
</script>
</body>
</html>
