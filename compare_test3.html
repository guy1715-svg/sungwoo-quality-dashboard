<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>HQ vs VINA 파일 비교</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
body{font-family:sans-serif;padding:20px;background:#f5f5f5;}
.box{background:#fff;border-radius:10px;padding:20px;margin-bottom:16px;border:1px solid #e4e4e4;}
.upload-area{border:2px dashed #ccc;border-radius:8px;padding:20px;text-align:center;margin-bottom:10px;}
.upload-area.done{border-color:#27ae60;border-style:solid;background:#f0fdf4;}
input[type=file]{display:block;margin:8px auto;}
button{width:100%;padding:12px;background:#1a1a2e;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:16px;}
button:disabled{background:#ccc;}
.card{background:#fff;border-radius:8px;padding:14px;margin-bottom:8px;border:1px solid #eee;}
.card.danger{border-left:4px solid #e74c3c;}
.card.warn{border-left:4px solid #f39c12;}
.card.ok{border-left:4px solid #27ae60;}
.card.ref{border-left:4px solid #ccc;opacity:0.6;}
.badge{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;}
.br{background:#fdedec;color:#c0392b;}.by{background:#fef9e7;color:#d68910;}.bg{background:#eafaf1;color:#1e8449;}.bk{background:#f0f0f0;color:#999;}
.spec-wrap{position:relative;height:38px;margin-top:10px;}
.sp-track{position:absolute;top:14px;left:0;right:0;height:8px;background:#f0f0f0;border-radius:4px;}
.sp-range{position:absolute;top:14px;height:8px;background:#dbeafe;border:1px solid #93c5fd;border-radius:3px;}
.sp-nom{position:absolute;top:14px;width:2px;height:8px;background:#93c5fd;}
.dot-hq{position:absolute;top:8px;width:20px;height:20px;border-radius:50%;background:#2980b9;border:2px solid #fff;box-shadow:0 2px 6px rgba(41,128,185,0.4);transform:translateX(-50%);z-index:2;}
.dot-vina{position:absolute;top:8px;width:20px;height:20px;border-radius:50%;background:#e74c3c;border:2px solid #fff;box-shadow:0 2px 6px rgba(231,76,60,0.4);transform:translateX(-50%);z-index:2;}
.lbl{position:absolute;bottom:0;font-size:9px;color:#aaa;transform:translateX(-50%);}
.lbl-c{color:#3b82f6;font-weight:600;}
#status{color:#888;font-size:12px;margin:8px 0;min-height:20px;}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
.kpi{text-align:center;padding:12px;border:1px solid #eee;border-radius:8px;}
.kv{font-size:22px;font-weight:700;}
.kl{font-size:11px;color:#888;}
</style>
</head>
<body>
<div class="box">
  <h2 style="margin-bottom:16px">HQ vs VINA 파일 비교</h2>
  <div style="display:flex;gap:16px;font-size:12px;margin-bottom:16px;align-items:center">
    <span><span style="width:12px;height:12px;border-radius:50%;background:#2980b9;display:inline-block;margin-right:4px"></span>본사(HQ)</span>
    <span><span style="width:12px;height:12px;border-radius:50%;background:#e74c3c;display:inline-block;margin-right:4px"></span>VINA</span>
    <span><span style="width:24px;height:8px;background:#dbeafe;border:1px solid #93c5fd;border-radius:2px;display:inline-block;margin-right:4px"></span>Spec 허용범위</span>
  </div>
  <div class="upload-area" id="hqArea">
    <div style="font-weight:700;color:#2980b9;margin-bottom:8px">🏢 본사(HQ) 파일</div>
    <input type="file" id="hqFile" accept=".xlsx,.xls">
    <div id="hqStatus" style="font-size:11px;color:#888">파일을 선택하세요</div>
  </div>
  <div class="upload-area" id="vinaArea">
    <div style="font-weight:700;color:#e74c3c;margin-bottom:8px">🌏 VINA 파일</div>
    <input type="file" id="vinaFile" accept=".xlsx,.xls">
    <div id="vinaStatus" style="font-size:11px;color:#888">파일을 선택하세요</div>
  </div>
  <div id="status"></div>
  <button id="runBtn" onclick="analyze()" disabled>📊 비교 분석 시작</button>
</div>

<div id="summary" style="display:none" class="box">
  <div class="grid4">
    <div class="kpi"><div class="kv" style="color:#1a1a2e" id="r-total">0</div><div class="kl">전체</div></div>
    <div class="kpi"><div class="kv" style="color:#c0392b" id="r-red">0</div><div class="kl">즉시수리</div></div>
    <div class="kpi"><div class="kv" style="color:#d68910" id="r-yellow">0</div><div class="kl">주의관찰</div></div>
    <div class="kpi"><div class="kv" style="color:#1e8449" id="r-green">0</div><div class="kl">정상</div></div>
  </div>
  <div id="cards"></div>
</div>

<script>
var SPEC={1:19.5,2:12.0,3:8.5,4:12.0,5:24.0,6:4.0,7:9.51,8:36.1,9:5.0,10:16.5,11:2.0,12:5.0,13:2.0,14:19.5,15:18.0,16:90.0,17:19.5,18:2.5};
var TOL={1:0.5,2:0.4,3:0.2,4:0.4,5:0.5,6:0.4,7:0.5,8:0.5,9:0.2,10:3.0,11:3.0,12:0.4,13:0.5,14:0.5,15:0.5,16:3.0,17:0.5,18:3.0};
var NAME={1:'상단 마운팅 Y축 거리',2:'좌측 브라켓 Y축 거리',3:'하단 홀 직경(ø8.5)',4:'중앙 브라켓 X축 거리',5:'하단 X축 거리',6:'좌측 단차 X축 거리',7:'우측 브라켓 Y축 거리',8:'파이프 직경(ø36.1)',9:'상단 홀 Y축',10:'파이프 연결 각도',11:'하단 플랜지 각도',12:'파이프 X축 거리',13:'스프링 클립 T값',14:'상단 X축 거리',15:'중앙 X축 거리',16:'플랜지 각도(90°)',17:'하단 Y축 거리',18:'파이프 각도(2.5°)'};
var ANGLE=[10,11,16,18];
var hqData={},vinaData={},hqReady=false,vinaReady=false;

function setStatus(msg){document.getElementById('status').textContent=msg;}
function pNum(v){if(v===null||v===undefined)return null;var n=parseFloat(String(v).trim());return isNaN(n)?null:n;}
function pInt(v){if(v===null||v===undefined)return null;var n=pNum(v);if(n===null)return null;var i=Math.round(n);return(i>=1&&i<=18&&Math.abs(n-i)<0.01)?i:null;}

document.getElementById('hqFile').addEventListener('change',function(){if(this.files[0])readFile('hq',this.files[0]);});
document.getElementById('vinaFile').addEventListener('change',function(){if(this.files[0])readFile('vina',this.files[0]);});

function readFile(type,file){
  setStatus(type.toUpperCase()+' 파일 읽는 중...');
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(e.target.result,{type:'array'});
      var result={};
      for(var si=0;si<wb.SheetNames.length;si++){
        var ws=wb.Sheets[wb.SheetNames[si]];
        var arr=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
        for(var ri=0;ri<arr.length;ri++){
          var row=arr[ri];
          if(!row||!row.length)continue;
          if(type==='hq'){
            // HQ: No=열3, Spec=열5, 평균=열15
            var no=pInt(row[3]);
            if(no){
              var spec=pNum(row[5]);
              var avg=pNum(row[15]);
              if(avg!==null&&avg!==0){
                if(!result[no])result[no]={spec:spec,vals:[]};
                result[no].vals.push(avg);
              }
            }
          } else {
            // VINA: No=열1, Average=열9
            var no2=pInt(row[1]);
            if(no2){
              var val=pNum(row[9]);
              if(val!==null){
                if(!result[no2])result[no2]={vals:[]};
                result[no2].vals.push(val);
              }
            }
          }
        }
      }
      var parsed={};
      var keys=Object.keys(result);
      for(var ki=0;ki<keys.length;ki++){
        var k=parseInt(keys[ki]);
        var d=result[k];
        if(d.vals.length>0){
          var sum=0;
          for(var vi=0;vi<d.vals.length;vi++)sum+=d.vals[vi];
          parsed[k]={avg:sum/d.vals.length,spec:d.spec};
        }
      }
      var foundNos=Object.keys(parsed).map(Number).sort(function(a,b){return a-b;});
      if(type==='hq'){
        hqData=parsed;hqReady=true;
        document.getElementById('hqArea').classList.add('done');
        document.getElementById('hqStatus').textContent='✅ '+file.name+' ('+foundNos.length+'개: No.'+foundNos.join(', ')+')';
      } else {
        vinaData=parsed;vinaReady=true;
        document.getElementById('vinaArea').classList.add('done');
        document.getElementById('vinaStatus').textContent='✅ '+file.name+' ('+foundNos.length+'개: No.'+foundNos.join(', ')+')';
      }
      if(hqReady&&vinaReady){
        document.getElementById('runBtn').disabled=false;
        setStatus('✅ 두 파일 모두 준비됨! 분석 시작 버튼을 누르세요.');
      } else {
        setStatus('✅ '+type.toUpperCase()+' 파싱 완료 ('+foundNos.length+'개 항목)');
      }
    }catch(err){setStatus('❌ 오류: '+err.message);console.error(err);}
  };
  reader.readAsArrayBuffer(file);
}

function toP(val,vMin,vRange){return Math.min(Math.max(((val-vMin)/vRange)*100,1),99);}

function analyze(){
  var cards=document.getElementById('cards');
  cards.innerHTML='';
  var rc=0,yc=0,gc=0,total=0;
  for(var no=1;no<=18;no++){
    var hq=hqData[no],vina=vinaData[no];
    if(!hq||!vina)continue;
    var spec=hq.spec||SPEC[no]||0;
    var tol=TOL[no]||0.5;
    var isAngle=ANGLE.indexOf(no)>=0;
    var gap=Math.abs(hq.avg-vina.avg);
    total++;
    var cls,badge,badgeTxt,gapColor,gapTxt;
    if(isAngle){cls='ref';badge='bk';badgeTxt='각도참고';gapColor='#aaa';gapTxt='-';}
    else if(gap>=0.1){cls='danger';badge='br';badgeTxt='🔴 즉시수리';gapColor='#c0392b';gapTxt=gap.toFixed(3);rc++;}
    else if(gap>=0.05){cls='warn';badge='by';badgeTxt='🟡 주의관찰';gapColor='#d68910';gapTxt=gap.toFixed(3);yc++;}
    else{cls='ok';badge='bg';badgeTxt='🟢 정상';gapColor='#1e8449';gapTxt=gap.toFixed(3);gc++;}
    var min=spec-tol,max=spec+tol;
    var vMin=spec-tol*1.8,vMax=spec+tol*1.8,vRange=vMax-vMin;
    var sL=toP(min,vMin,vRange),sR=toP(max,vMin,vRange);
    var nomP=toP(spec,vMin,vRange);
    var hqP=toP(hq.avg,vMin,vRange);
    var vinaP=toP(vina.avg,vMin,vRange);
    var hqOut=hq.avg<min||hq.avg>max;
    var vinaOut=vina.avg<min||vina.avg>max;
    var div=document.createElement('div');
    div.className='card '+cls;
    div.innerHTML=
      '<div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">'+
        '<div style="width:28px;height:28px;border-radius:50%;background:#1a1a2e;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">'+no+'</div>'+
        '<div style="flex:1">'+
          '<div style="font-size:13px;font-weight:700">'+(NAME[no]||'No.'+no)+'</div>'+
          '<div style="font-size:11px;color:#888">Spec: '+spec+' &plusmn; '+tol+' &nbsp; 범위: '+min.toFixed(3)+' ~ '+max.toFixed(3)+'</div>'+
        '</div>'+
        '<div style="display:flex;gap:10px;font-size:11px;flex-wrap:wrap">'+
          '<span style="color:#2980b9;font-weight:600">🔵 HQ: '+hq.avg.toFixed(4)+(hqOut?' ⚠️':'')+'</span>'+
          '<span style="color:#e74c3c;font-weight:600">🔴 VINA: '+vina.avg.toFixed(4)+(vinaOut?' ⚠️':'')+'</span>'+
          '<span style="color:'+gapColor+';font-weight:600">Gap: '+gapTxt+'</span>'+
          '<span class="badge '+badge+'">'+badgeTxt+'</span>'+
        '</div>'+
      '</div>'+
      '<div class="spec-wrap">'+
        '<div class="sp-track"></div>'+
        '<div class="sp-range" style="left:'+sL+'%;width:'+(sR-sL)+'%"></div>'+
        '<div class="sp-nom" style="left:'+nomP+'%"></div>'+
        '<div class="dot-hq" style="left:'+hqP+'%"></div>'+
        '<div class="dot-vina" style="left:'+vinaP+'%"></div>'+
        '<div class="lbl" style="left:'+sL+'%">'+min.toFixed(2)+'</div>'+
        '<div class="lbl lbl-c" style="left:'+nomP+'%">'+spec+'</div>'+
        '<div class="lbl" style="left:'+sR+'%">'+max.toFixed(2)+'</div>'+
      '</div>';
    cards.appendChild(div);
  }
  document.getElementById('r-total').textContent=total;
  document.getElementById('r-red').textContent=rc;
  document.getElementById('r-yellow').textContent=yc;
  document.getElementById('r-green').textContent=gc;
  document.getElementById('summary').style.display='block';
  document.getElementById('summary').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
