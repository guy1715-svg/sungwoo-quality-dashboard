<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>파일 비교 테스트</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: sans-serif; padding: 20px; background: #f5f5f5; }
.box { background: #fff; border-radius: 10px; padding: 20px; margin-bottom: 16px; border: 1px solid #e4e4e4; }
.upload-area { border: 2px dashed #ccc; border-radius: 8px; padding: 20px; text-align: center; cursor: pointer; position: relative; margin-bottom: 10px; }
.upload-area:hover { border-color: #3b82f6; }
.upload-area.done { border-color: #27ae60; background: #f0fdf4; border-style: solid; }
input[type=file] { position: absolute; top:0;left:0;width:100%;height:100%;opacity:0;cursor:pointer; }
button { width: 100%; padding: 12px; background: #1a1a2e; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; margin-bottom: 16px; }
button:disabled { background: #ccc; }
.result { display: none; }
.card { background: #fff; border-radius: 8px; padding: 14px; margin-bottom: 8px; border: 1px solid #eee; }
.card.danger { border-left: 4px solid #e74c3c; }
.card.warn { border-left: 4px solid #f39c12; }
.card.ok { border-left: 4px solid #27ae60; }
.card.ref { border-left: 4px solid #ccc; opacity: 0.6; }
.row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.no { width: 28px; height: 28px; border-radius: 50%; background: #1a1a2e; color: #fff; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
.badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
.br { background: #fdedec; color: #c0392b; }
.by { background: #fef9e7; color: #d68910; }
.bg { background: #eafaf1; color: #1e8449; }
.bk { background: #f0f0f0; color: #999; }
.spec-chart { position: relative; height: 38px; margin-top: 10px; }
.track { position: absolute; top: 14px; left: 0; right: 0; height: 8px; background: #f0f0f0; border-radius: 4px; }
.range { position: absolute; top: 14px; height: 8px; background: #dbeafe; border: 1px solid #93c5fd; border-radius: 3px; }
.dot-hq { position: absolute; top: 8px; width: 20px; height: 20px; border-radius: 50%; background: #2980b9; border: 2px solid #fff; box-shadow: 0 2px 6px rgba(41,128,185,0.4); transform: translateX(-50%); z-index: 2; }
.dot-vina { position: absolute; top: 8px; width: 20px; height: 20px; border-radius: 50%; background: #e74c3c; border: 2px solid #fff; box-shadow: 0 2px 6px rgba(231,76,60,0.4); transform: translateX(-50%); z-index: 2; }
.lbl { position: absolute; bottom: 0; font-size: 9px; color: #aaa; transform: translateX(-50%); }
.lbl-c { color: #3b82f6; font-weight: 600; }
.legend { display: flex; gap: 16px; font-size: 12px; margin-bottom: 12px; align-items: center; }
.dot-sm { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
#log { font-size: 11px; color: #888; margin-top: 8px; }
</style>
</head>
<body>

<div class="box">
  <h2 style="font-size:16px;margin-bottom:16px;">HQ vs VINA 파일 비교 테스트</h2>
  
  <div class="legend">
    <span><span class="dot-sm" style="background:#2980b9"></span> 본사(HQ)</span>
    <span><span class="dot-sm" style="background:#e74c3c"></span> VINA</span>
    <span style="display:inline-block;width:24px;height:8px;background:#dbeafe;border:1px solid #93c5fd;border-radius:2px;"></span> Spec범위
  </div>

  <div class="upload-area" id="hqArea">
    <input type="file" id="hqFile" accept=".xlsx,.xls" onchange="loadFile('hq',this)">
    <div style="font-size:14px;font-weight:700;color:#2980b9">🏢 본사(HQ) 파일 선택</div>
    <div id="hqLabel" style="font-size:11px;color:#888;margin-top:4px">HQ_37번_... xlsx</div>
  </div>

  <div class="upload-area" id="vinaArea">
    <input type="file" id="vinaFile" accept=".xlsx,.xls" onchange="loadFile('vina',this)">
    <div style="font-size:14px;font-weight:700;color:#e74c3c">🌏 VINA 파일 선택</div>
    <div id="vinaLabel" style="font-size:11px;color:#888;margin-top:4px">Measurement Data_... xlsx</div>
  </div>

  <div id="log"></div>
  <button id="runBtn" onclick="analyze()" disabled>📊 비교 분석 시작</button>
</div>

<div class="result" id="resultArea">
  <div class="box">
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px">
      <div style="background:#fff;border:1px solid #eee;border-radius:8px;padding:12px;text-align:center"><div style="font-size:22px;font-weight:700;color:#1a1a2e" id="r-total">-</div><div style="font-size:11px;color:#888">전체</div></div>
      <div style="background:#fff;border:1px solid #eee;border-radius:8px;padding:12px;text-align:center"><div style="font-size:22px;font-weight:700;color:#c0392b" id="r-red">-</div><div style="font-size:11px;color:#888">즉시수리</div></div>
      <div style="background:#fff;border:1px solid #eee;border-radius:8px;padding:12px;text-align:center"><div style="font-size:22px;font-weight:700;color:#d68910" id="r-yellow">-</div><div style="font-size:11px;color:#888">주의관찰</div></div>
      <div style="background:#fff;border:1px solid #eee;border-radius:8px;padding:12px;text-align:center"><div style="font-size:22px;font-weight:700;color:#1e8449" id="r-green">-</div><div style="font-size:11px;color:#888">정상</div></div>
    </div>
    <div id="cards"></div>
  </div>
</div>

<script>
const SPEC = {1:19.5,2:12.0,3:8.5,4:12.0,5:24.0,6:4.0,7:9.51,8:36.1,9:5.0,10:16.5,11:2.0,12:5.0,13:2.0,14:19.5,15:18.0,16:90.0,17:19.5,18:2.5};
const TOL  = {1:0.5,2:0.4,3:0.2,4:0.4,5:0.5,6:0.4,7:0.5,8:0.5,9:0.2,10:3.0,11:3.0,12:0.4,13:0.5,14:0.5,15:0.5,16:3.0,17:0.5,18:3.0};
const NAME = {1:'상단 마운팅 Y축 거리',2:'좌측 브라켓 Y축 거리',3:'하단 홀 직경 (ø8.5)',4:'중앙 브라켓 X축 거리',5:'하단 X축 거리',6:'좌측 단차 X축 거리',7:'우측 브라켓 Y축 거리',8:'우측 파이프 직경 (ø36.1)',9:'우측 상단 홀 Y축',10:'파이프 연결 각도',11:'하단 플랜지 각도',12:'파이프 X축 거리',13:'스프링 클립 두께 (T값)',14:'상단 X축 거리',15:'중앙 X축 거리',16:'좌측 플랜지 각도 (90°)',17:'하단 Y축 거리',18:'우측 파이프 각도 (2.5°)'};
const ANGLE = [10,11,16,18];

let hqData = null, vinaData = null;

function log(msg) {
  document.getElementById('log').textContent = msg;
}

function pInt(v) {
  if(v === null || v === undefined) return null;
  const n = parseFloat(String(v).trim());
  if(isNaN(n)) return null;
  const i = Math.round(n);
  return (i > 0 && i < 200 && Math.abs(n-i) < 0.001) ? i : null;
}

function pNum(v) {
  if(v === null || v === undefined) return null;
  const n = parseFloat(String(v).trim());
  return isNaN(n) ? null : n;
}

function loadFile(type, input) {
  const file = input.files[0];
  if(!file) return;
  log('읽는 중: ' + file.name);
  
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(e.target.result, {type:'array'});
      const result = {};
      
      wb.SheetNames.forEach(function(sname) {
        const ws = wb.Sheets[sname];
        const arr = XLSX.utils.sheet_to_json(ws, {header:1, defval:null});
        
        arr.forEach(function(row) {
          if(!Array.isArray(row)) return;
          
          if(type === 'hq') {
            // HQ: No=열4, Spec=열6, RH평균=열16, LH평균=열15
            const no = pInt(row[4]);
            if(no && no >= 1 && no <= 18) {
              const spec = pNum(row[6]);
              let avg = pNum(row[16]);
              if(avg === null || avg === 0) avg = pNum(row[15]);
              if(avg !== null && avg !== 0) {
                if(!result[no]) result[no] = {spec: spec, vals: []};
                result[no].vals.push(avg);
              }
            }
          } else {
            // VINA: No=열2, Average=열10
            const no = pInt(row[2]);
            if(no && no >= 1 && no <= 18) {
              const val = pNum(row[10]);
              if(val !== null) {
                if(!result[no]) result[no] = {vals: []};
                result[no].vals.push(val);
              }
            }
          }
        });
      });
      
      // 평균 계산
      const parsed = {};
      Object.keys(result).forEach(function(no) {
        const d = result[no];
        if(d.vals.length > 0) {
          const avg = d.vals.reduce(function(a,b){return a+b;},0) / d.vals.length;
          parsed[parseInt(no)] = {avg: avg, spec: d.spec};
        }
      });
      
      const keys = Object.keys(parsed).map(Number).sort((a,b)=>a-b);
      log('✅ ' + type.toUpperCase() + ' 파싱 완료: No.' + keys.join(', No.'));
      
      if(type === 'hq') {
        hqData = parsed;
        document.getElementById('hqLabel').textContent = '✅ ' + file.name;
        document.getElementById('hqArea').classList.add('done');
      } else {
        vinaData = parsed;
        document.getElementById('vinaLabel').textContent = '✅ ' + file.name;
        document.getElementById('vinaArea').classList.add('done');
      }
      
      if(hqData && vinaData) {
        document.getElementById('runBtn').disabled = false;
        log('✅ 두 파일 모두 준비됨! 분석 시작 버튼을 누르세요.');
      }
      
    } catch(err) {
      log('❌ 오류: ' + err.message);
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
}

function toP(val, vMin, vRange) {
  return Math.min(Math.max(((val-vMin)/vRange)*100, 1), 99);
}

function analyze() {
  const cards = document.getElementById('cards');
  cards.innerHTML = '';
  let rc=0, yc=0, gc=0, total=0;

  for(let no=1; no<=18; no++) {
    const hq = hqData[no];
    const vina = vinaData[no];
    if(!hq || !vina) { console.log('No.'+no+' 없음'); continue; }
    
    const spec = hq.spec || SPEC[no] || 0;
    const tol = TOL[no] || 0.5;
    const isAngle = ANGLE.indexOf(no) >= 0;
    const gap = Math.abs(hq.avg - vina.avg);
    total++;
    
    let cls, badge, badgeTxt, gapColor, gapTxt;
    if(isAngle) { cls='ref'; badge='bk'; badgeTxt='각도참고'; gapColor='#aaa'; gapTxt='-'; }
    else if(gap >= 0.1) { cls='danger'; badge='br'; badgeTxt='🔴 즉시수리'; gapColor='#c0392b'; gapTxt=gap.toFixed(3); rc++; }
    else if(gap >= 0.05) { cls='warn'; badge='by'; badgeTxt='🟡 주의관찰'; gapColor='#d68910'; gapTxt=gap.toFixed(3); yc++; }
    else { cls='ok'; badge='bg'; badgeTxt='🟢 정상'; gapColor='#1e8449'; gapTxt=gap.toFixed(3); gc++; }

    const min = spec-tol, max = spec+tol;
    const vMin = spec-tol*1.8, vMax = spec+tol*1.8, vRange = vMax-vMin;
    const sL = toP(min,vMin,vRange), sR = toP(max,vMin,vRange);
    const nomP = toP(spec,vMin,vRange);
    const hqP = toP(hq.avg,vMin,vRange);
    const vinaP = toP(vina.avg,vMin,vRange);
    const hqOut = hq.avg<min||hq.avg>max;
    const vinaOut = vina.avg<min||vina.avg>max;

    const div = document.createElement('div');
    div.className = 'card ' + cls;
    div.innerHTML = `
      <div class="row">
        <div class="no">${no}</div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:700">${NAME[no]||'No.'+no}</div>
          <div style="font-size:11px;color:#888">Spec: ${spec} ± ${tol} &nbsp; 범위: ${min.toFixed(3)} ~ ${max.toFixed(3)}</div>
        </div>
        <div style="display:flex;gap:10px;font-size:11px;flex-wrap:wrap">
          <span style="color:#2980b9;font-weight:600">🔵 HQ: ${hq.avg.toFixed(4)}${hqOut?' ⚠️':''}</span>
          <span style="color:#e74c3c;font-weight:600">🔴 VINA: ${vina.avg.toFixed(4)}${vinaOut?' ⚠️':''}</span>
          <span style="color:${gapColor};font-weight:600">Gap: ${gapTxt}</span>
          <span class="badge ${badge}">${badgeTxt}</span>
        </div>
      </div>
      <div class="spec-chart">
        <div class="track"></div>
        <div class="range" style="left:${sL}%;width:${sR-sL}%"></div>
        <div style="position:absolute;top:14px;left:${nomP}%;width:2px;height:8px;background:#93c5fd"></div>
        <div class="dot-hq" style="left:${hqP}%" title="HQ: ${hq.avg.toFixed(4)}"></div>
        <div class="dot-vina" style="left:${vinaP}%" title="VINA: ${vina.avg.toFixed(4)}"></div>
        <div class="lbl" style="left:${sL}%">${min.toFixed(2)}</div>
        <div class="lbl lbl-c" style="left:${nomP}%">${spec}</div>
        <div class="lbl" style="left:${sR}%">${max.toFixed(2)}</div>
      </div>
    `;
    cards.appendChild(div);
  }

  document.getElementById('r-total').textContent = total;
  document.getElementById('r-red').textContent = rc;
  document.getElementById('r-yellow').textContent = yc;
  document.getElementById('r-green').textContent = gc;
  document.getElementById('resultArea').style.display = 'block';
  document.getElementById('resultArea').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
